<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Librarian: friendly AI book recommendations powered by RAG and OpenAI." />
    <title>Smart Librarian</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      :root {
        --bg: #fff6f8;
        --bg-soft: #ffeef3;
        --card: #ffffff;
        --ink: #2e2430;
        --muted: #6f5f74;
        --brand: #e40046;
        --brand-hover: #c4003d;
        --accent: #ff8a00;
        --accent-hover: #e67700;
        --line: #f2d7e2;
        --shadow: 0 14px 36px rgba(131, 36, 70, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Nunito Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 6% -5%, #ffd7e4 0%, transparent 32%),
          radial-gradient(circle at 95% 0%, #ffe5bf 0%, transparent 25%),
          linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 55%);
      }

      .layout {
        max-width: 980px;
        margin: 0 auto;
        padding: 22px 16px 28px;
      }

      .brand-strip {
        width: 100%;
        background: linear-gradient(90deg, var(--brand) 0%, #ff2f6f 100%);
        color: #ffffff;
        font-size: 0.92rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        border-radius: 14px;
        padding: 10px 14px;
        box-shadow: var(--shadow);
        margin-bottom: 14px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
      }

      .panel + .panel {
        margin-top: 14px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.65rem, 2.8vw, 2.3rem);
        font-family: "Merriweather", Georgia, serif;
        color: #3a2231;
      }

      .sub {
        color: var(--muted);
        margin-top: 8px;
        line-height: 1.45;
      }

      .chat-box {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .label {
        font-size: 0.95rem;
        font-weight: 700;
      }

      .hint {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      fieldset {
        margin: 0;
        padding: 0;
        border: 0;
        min-width: 0;
      }

      legend {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 8px;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #fff7fa;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        color: #4e3c50;
      }

      .toggle input {
        accent-color: var(--brand);
      }

      textarea {
        width: 100%;
        min-height: 118px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px;
        font: inherit;
        color: var(--ink);
        background: #ffffff;
      }

      textarea:focus-visible {
        outline: 2px solid #ff9cbe;
        outline-offset: 1px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .primary {
        background: var(--brand);
        color: #fff;
      }

      .primary:hover {
        background: var(--brand-hover);
      }

      .secondary {
        background: var(--accent);
        color: #fff;
      }

      .secondary:hover {
        background: var(--accent-hover);
      }

      .ghost {
        background: #ffe3ed;
        color: #8a2551;
      }

      .ghost:hover {
        background: #ffd0e2;
      }

      .out {
        white-space: pre-wrap;
        line-height: 1.5;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        min-height: 120px;
      }

      .media {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      img {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
      }

      .audio-card,
      .image-card {
        background: #fff8fb;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
      }

      @media (max-width: 900px) {
        .media {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .layout {
          padding: 16px 12px 24px;
        }

        .panel {
          padding: 14px;
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="layout">
      <div class="brand-strip">Book picks you'll actually enjoy</div>

      <section class="panel" aria-labelledby="assistant-title">
        <h1 id="assistant-title">Smart Librarian</h1>
        <p class="sub">Book recommendations with voice input, and optional audio/image output, only for you :3</p>

        <div class="chat-box">
          <div class="field">
            <label class="label" for="queryInput">What are you in the mood to read?</label>
            <p class="hint">Example: I want a book about friendship and magic.</p>
            <textarea id="queryInput" v-model="message" placeholder="Describe your interests and themes..."></textarea>
          </div>

          <fieldset aria-label="Recommendation options">
            <legend>Options</legend>
            <div class="row">
              <label class="toggle"><input type="checkbox" v-model="enableTts" /> Enable TTS</label>
              <label class="toggle"><input type="checkbox" v-model="enableImage" /> Generate image</label>
              <label class="toggle"><input type="checkbox" v-model="voiceMode" /> Voice mode</label>
            </div>
          </fieldset>

          <div class="row">
            <button type="button" class="primary" @click="sendChat" :disabled="loading">{{ loading ? 'Thinking...' : 'Get Recommendation' }}</button>
            <button type="button" class="secondary" v-if="voiceMode && !recording" @click="startRecording">Start Voice Input</button>
            <button type="button" class="ghost" v-if="recording" @click="stopRecording">Stop Voice Input</button>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="output-title">
        <strong id="output-title">Assistant Output</strong>
        <div class="out" aria-live="polite">{{ answerText }}</div>
        <div class="media" v-if="audioUrl || imageUrl">
          <div v-if="audioUrl" class="audio-card">
            <strong>Audio</strong>
            <audio :src="audioUrl" controls style="width: 100%; margin-top: 8px"></audio>
          </div>
          <div v-if="imageUrl" class="image-card">
            <strong>Generated Image</strong>
            <img :src="imageUrl" alt="Generated book scene" style="margin-top: 8px" />
          </div>
        </div>
      </section>
    </main>

    <script>
      const { createApp } = Vue;
      const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

      createApp({
        data() {
          return {
            message: "",
            loading: false,
            answerText: "",
            enableTts: false,
            enableImage: false,
            voiceMode: false,
            mediaRecorder: null,
            audioChunks: [],
            recording: false,
            audioUrl: null,
            imageUrl: null,
          };
        },
        methods: {
          async sendChat() {
            const trimmed = this.message.trim();
            if (!trimmed) {
              this.answerText = "Please enter a message first.";
              return;
            }
            this.loading = true;
            this.answerText = "";
            this.audioUrl = null;
            this.imageUrl = null;
            try {
              const resp = await fetch(`${API_BASE}/api/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  message: trimmed,
                  enable_tts: this.enableTts,
                  enable_image: this.enableImage,
                }),
              });

              if (!resp.ok) {
                let err = null;
                try {
                  err = await resp.json();
                } catch (_ignored) {
                  err = null;
                }
                throw new Error((err && err.detail) || "I couldn't generate a recommendation right now. Please try again shortly.");
              }

              const data = await resp.json();
              if (data.blocked) {
                this.answerText = data.detailed_summary || "Message blocked.";
              } else {
                this.answerText = `Recommended book: ${data.recommendation_title}\nWhy: ${data.reason}\n\nDetailed summary:\n${data.detailed_summary}`;
              }

              if (data.audio_url) {
                this.audioUrl = API_BASE ? `${API_BASE}${data.audio_url}` : data.audio_url;
              }
              if (data.image_url) {
                this.imageUrl = API_BASE ? `${API_BASE}${data.image_url}` : data.image_url;
              }

            } catch (err) {
              console.error("Chat request error:", err);
              this.answerText = "I couldn't generate a recommendation right now. Please try again shortly.";
            } finally {
              this.loading = false;
            }
          },

          async startRecording() {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              this.audioChunks = [];
              this.mediaRecorder = new MediaRecorder(stream);
              this.mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) this.audioChunks.push(event.data);
              };
              this.mediaRecorder.onstop = () => {
                stream.getTracks().forEach((track) => track.stop());
                this.uploadVoice();
              };
              this.mediaRecorder.start();
              this.recording = true;
            } catch (err) {
              console.error("Microphone error:", err);
              this.answerText = "I couldn't access your microphone. Please check permissions and try again.";
            }
          },

          stopRecording() {
            if (this.mediaRecorder && this.recording) {
              this.mediaRecorder.stop();
              this.recording = false;
            }
          },

          async uploadVoice() {
            try {
              const blob = new Blob(this.audioChunks, { type: "audio/webm" });
              const form = new FormData();
              form.append("file", blob, "voice.webm");

              const resp = await fetch(`${API_BASE}/api/stt`, {
                method: "POST",
                body: form,
              });

              if (!resp.ok) {
                let err = null;
                try {
                  err = await resp.json();
                } catch (_ignored) {
                  err = null;
                }
                throw new Error((err && err.detail) || "I couldn't process the voice input right now. Please try again.");
              }

              const data = await resp.json();
              this.message = data.text || "";
              if (this.message.trim()) {
                await this.sendChat();
              }
            } catch (err) {
              console.error("STT error:", err);
              this.answerText = "I couldn't process the voice input right now. Please try again.";
            }
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
